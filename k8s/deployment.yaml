apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-api
  labels:
    app: shop-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: shop-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # at most 1 extra pod above desired count during rollout
      maxUnavailable: 0  # never take a pod down before a new one is Ready
  template:
    metadata:
      labels:
        app: shop-api
    spec:
      containers:
        - name: shop-api
          image: mohamedmanja/shop-api:1.1
          imagePullPolicy: Always   # re-pull on every pod (re)start — needed when reusing a tag
          ports:
            - containerPort: 8080

          readinessProbe:
            httpGet:
              path: /api/products   # public endpoint — no auth required
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/products
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 3

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
