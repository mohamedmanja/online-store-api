spring:
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:online_store}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/auth/google/callback"
            scope: email, profile
          facebook:
            client-id: ${FACEBOOK_APP_ID:}
            client-secret: ${FACEBOOK_APP_SECRET:}
            redirect-uri: "{baseUrl}/auth/facebook/callback"
            scope: email, public_profile
        provider:
          facebook:
            user-info-uri: https://graph.facebook.com/me?fields=id,name,email,picture

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    from: ${SMTP_FROM:no-reply@harmony.store}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: "*"
            checkserveridentity: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:supersecretjwtkeyforharmonystorethatisatleast256bits}
    expiry-days: 7
    pending-expiry-minutes: 10
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  origin:
    name: ${ORIGIN_NAME:Harmony Store}
    address: ${ORIGIN_ADDRESS:123 Main St}
    city: ${ORIGIN_CITY:New York}
    state: ${ORIGIN_STATE:NY}
    zip: ${ORIGIN_ZIP:10001}
    country: ${ORIGIN_COUNTRY:US}
    email: ${ORIGIN_EMAIL:}
    phone: ${ORIGIN_PHONE:}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  shippo:
    api-key: ${SHIPPO_API_KEY:}
    webhook-secret: ${SHIPPO_WEBHOOK_SECRET:}
  minio:
    endpoint: ${MINIO_ENDPOINT:localhost}
    port: ${MINIO_PORT:9000}
    use-ssl: ${MINIO_USE_SSL:false}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    url: ${MINIO_URL:http://localhost:9000/mmanja-com-online-store}
