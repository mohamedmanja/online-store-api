# Security
app.frontend-url=http://localhost:3000

# OAuth2 stubs – prevents SecurityConfig.oauth2Login() from failing on startup
spring.security.oauth2.client.registration.google.client-id=test-google-id
spring.security.oauth2.client.registration.google.client-secret=test-google-secret
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.facebook.client-id=test-fb-id
spring.security.oauth2.client.registration.facebook.client-secret=test-fb-secret
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/auth/facebook/callback

